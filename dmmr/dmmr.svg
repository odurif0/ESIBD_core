<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 128 128" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2e3e"/>
      <stop offset="100%" stop-color="#0c1a24"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="wire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect x="4" y="4" width="120" height="120" rx="18" fill="url(#panel)"
        stroke="#2a4a5a" stroke-width="2"/>

  <!-- Subtle circuit trace decorations -->
  <path d="M 20 24 H 40" stroke="#1a3a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 88 24 H 108" stroke="#1a3a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 20 104 H 40" stroke="#1a3a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 88 104 H 108" stroke="#1a3a4a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="24" r="2.5" fill="#1a3a4a"/>
  <circle cx="108" cy="24" r="2.5" fill="#1a3a4a"/>
  <circle cx="20" cy="104" r="2.5" fill="#1a3a4a"/>
  <circle cx="108" cy="104" r="2.5" fill="#1a3a4a"/>

  <!-- Input wire -->
  <line x1="64" y1="18" x2="64" y2="33" stroke="url(#wire)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Ammeter glow -->
  <circle cx="64" cy="60" r="28" fill="none" stroke="#4fc3f7" stroke-width="6" opacity="0.15"/>
  <!-- Ammeter circle -->
  <circle cx="64" cy="60" r="25" fill="#0a1820" stroke="url(#ring)" stroke-width="3.5"/>
  <!-- A label -->
  <text x="64" y="72" font-size="32" font-weight="bold" fill="#e0f4f8"
        font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">A</text>

  <!-- Wire to ground -->
  <line x1="64" y1="85" x2="64" y2="98" stroke="url(#wire)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Ground symbol -->
  <line x1="46" y1="98"  x2="82" y2="98"  stroke="#80deea" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="105" x2="76" y2="105" stroke="#80deea" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="112" x2="70" y2="112" stroke="#80deea" stroke-width="3" stroke-linecap="round"/>
</svg>
